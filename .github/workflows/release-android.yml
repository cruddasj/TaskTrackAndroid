name: Release Android APK

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        env:
          BUILD_TARGET: android
        run: npm run build

      - name: Ensure Android platform exists
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Generate branded Android app icons
        run: npx @capacitor/assets generate --android --assetPath assets

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Configure stable debug signing key
        run: |
          mkdir -p "$HOME/.android"
          cp .github/android/debug.keystore "$HOME/.android/debug.keystore"

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Rename APK artifact
        run: cp android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/TaskTrack.apk

      - name: Prepare release metadata
        id: release_meta
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}-build-${GITHUB_RUN_NUMBER}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=TaskTrack $TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          generate_release_notes: true
          files: android/app/build/outputs/apk/debug/TaskTrack.apk
