<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <rect width="400" height="400" fill="#0F1A12" />
  <defs>
    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(200, 200)">
    <circle cx="0" cy="0" r="75" fill="none" stroke="#253A25" stroke-width="14" />

    <circle cx="0" cy="0" r="75" fill="none" stroke="#68ED6E" stroke-width="14" 
            stroke-dasharray="360 120" stroke-linecap="round" 
            transform="rotate(-110)" filter="url(#neon-glow)" />

    <polygon points="50,-62 70,-45 45,-40" fill="#68ED6E" filter="url(#neon-glow)" />

    <g stroke="#68ED6E" stroke-width="6" stroke-linecap="round" opacity="0.8">
      <line x1="0" y1="-55" x2="0" y2="-40" />
      <line x1="0" y1="55" x2="0" y2="40" />
      <line x1="-55" y1="0" x2="-40" y2="0" />
      <line x1="55" y1="0" x2="40" y2="0" />
    </g>

    <path d="M -25 5 L -5 25 L 30 -15" fill="none" stroke="#68ED6E" 
          stroke-width="14" stroke-linecap="round" stroke-linejoin="round" 
          filter="url(#neon-glow)" />
  </g>
</svg>
